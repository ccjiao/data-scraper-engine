name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linting tools
        run: pip install ruff flake8
      - name: Run Ruff check
        run: ruff check . --ignore E501 --ignore F401 --ignore E402
      - name: Run flake8
        run: flake8 . --max-line-length=120 --exclude=__pycache__,.git,venv --ignore=E501,F401,W503

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short --cov=engine --cov=scripts --cov-report=term-missing
        env:
          PYTHONPATH: .

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  build-verify:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Verify CLI works
        run: |
          python scripts/scraper.py --help
          python scripts/scraper.py list
      - name: Verify URL router
        run: |
          python -c "
          from engine.router import URLRouter
          r = URLRouter.route('https://www.lottery.gov.cn/kj/kjlb.html?dlt')
          assert r.handler == 'lottery', f'Expected lottery, got {r.handler}'
          r2 = URLRouter.route('https://live.douyin.com/123456')
          assert r2.handler == 'douyin_live', f'Expected douyin_live, got {r2.handler}'
          r3 = URLRouter.route('https://example.com')
          assert r3.handler == 'generic_web', f'Expected generic_web, got {r3.handler}'
          print('✅ All router tests passed')
          "

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-verify]
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate release notes
        run: |
          echo "## What's Changed" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          git log --oneline $(git describe --tags --abbrev=0 HEAD^)..HEAD >> RELEASE_NOTES.md || true
          cat RELEASE_NOTES.md
